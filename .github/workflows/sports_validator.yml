name: Global Sports Scraper and Unique Validator

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository codebase
        uses: actions/checkout@v4

      - name: Initialize Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute massive unique validation script
        run: python validate_sports.py

      - name: Check file state changes
        id: file_status
        run: |
          touch sports.m3u8
          git add sports.m3u8
          if git diff --cached --quiet sports.m3u8; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push filtered unique results
        if: steps.file_status.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "⚽ Sync Unique Live Sports Playlist: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
